// slider buckets -> color points
function sliderColor(q,val){
  if(q==='q12'){ if(val>=8)return{RUD:2,LOS:1}; if(val>=6)return{JAN:1,LOS:1}; if(val>=4)return{OLI:1}; return{OLI:1,MAT:1,SAF:1}; }
  if(q==='q21'){ if(val>=8)return{LOS:2}; if(val>=6)return{LOS:1,JAN:1}; if(val>=4)return{OLI:1}; return{MAT:2}; }
  if(q==='q26'){ if(val<=3)return{SVE:1,JAN:1}; if(val>=8)return{RUD:1,OLI:1}; return{}; }
  return{};
}
const TIEBREAK_A=['PAN','SOK','ORL','LAB','PND','SOV','LIS','JEL','MED','TUC','VYD','KOL','DEL','LEV'];
const TIEBREAK_C=['SVE','SAF','MAT','RUD','OLI','LOS','JAN'];

function addPts(acc,map){ for(const k in map) acc[k]=(acc[k]||0)+map[k]; }
function pickTop(pts,order){
  let best=null,bestv=-1;
  for(const k of order){ const v=pts[k]||0; if(v>bestv){bestv=v;best=k;} }
  return bestv>0?best:order[0];
}
// answers: {qid: value | [values] | number}
function computeResult(answers){
  const a={},c={};
  for(const q in ANIMAL_SCORES){
    const ans=answers[q]; if(ans==null) continue;
    if(Array.isArray(ans)) ans.forEach(v=>{ if(ANIMAL_SCORES[q][v]) addPts(a,ANIMAL_SCORES[q][v]); });
    else if(ANIMAL_SCORES[q][ans]) addPts(a,ANIMAL_SCORES[q][ans]);
  }
  for(const q in COLOR_SCORES){
    const ans=answers[q]; if(ans==null) continue;
    if(Array.isArray(ans)) ans.forEach(v=>{ if(COLOR_SCORES[q][v]) addPts(c,COLOR_SCORES[q][v]); });
    else if(COLOR_SCORES[q][ans]) addPts(c,COLOR_SCORES[q][ans]);
  }
  ['q12','q21','q26'].forEach(q=>{ if(typeof answers[q]==='number') addPts(c,sliderColor(q,answers[q])); });
  return { animal: pickTop(a,TIEBREAK_A), color: pickTop(c,TIEBREAK_C), animalPts:a, colorPts:c };
}
function composeName(animalKey,colorKey,lang){
  const A=ANIMALS[animalKey], C=COLORS[colorKey];
  if(lang==='en') return C.en.adj+' '+A.en.name;
  const adj = A.g==='m'? C.cz.adjM : C.cz.adjF;
  return adj+' '+A.cz.name;
}

/* ---------- Community placeholder links (doplň Stripe URL) ---------- */
const COMMUNITY_LINKS={SOK:'#',LIS:'#',SOV:'#',DEL:'#',PAN:'#',JEL:'#',LAB:'#',VYD:'#',KOL:'#',MED:'#',ORL:'#',LEV:'#',TUC:'#',PND:'#'};

let LANG = 'en';
let lastResult=null;
const TOTAL=QUESTIONS.length;

function setLang(l){ LANG=l; document.documentElement.lang = l==='cz'?'cs':'en';
  document.getElementById('lang-cz').classList.toggle('on',l==='cz');
  document.getElementById('lang-en').classList.toggle('on',l==='en');
  render(); if(lastResult) showResult(lastResult,false);
}

function render(){
  const u=UI[LANG];
  document.getElementById('heroTitle').textContent=u.heroTitle;
  document.getElementById('heroSub').textContent=u.sub;
  document.getElementById('introBadge').textContent=u.introBadge;
  document.getElementById('cardNote').textContent=u.cardNote;
  document.getElementById('genBtn').textContent=u.gen;
  document.getElementById('btnShare').textContent=u.share;
  document.getElementById('btnRestart').textContent=u.restart;
  document.getElementById('resHead').textContent=u.resHead;
  document.getElementById('footer').innerHTML='<div>'+u.privacy+'</div><div style="margin-top:6px;opacity:.7">'+u.footer+'</div>';

  const saved=collectAnswers();
  const quiz=document.getElementById('quiz'); quiz.innerHTML='';
  let curSec=0;
  QUESTIONS.forEach((q,i)=>{
    if(q.sec!==curSec){ curSec=q.sec;
      const sh=document.createElement('div'); sh.className='section-head';
      sh.innerHTML='<div class="section-num">'+curSec+'</div><div class="section-title">'+SECTIONS[curSec][LANG]+'</div>';
      const sec=document.createElement('div'); sec.className='section'; sec.appendChild(sh); sec.id='sec'+curSec; quiz.appendChild(sec);
    }
    const sec=document.getElementById('sec'+curSec);
    const box=document.createElement('div'); box.className='q'; box.dataset.q=q.id;
    let html='<div class="q-label"><span class="q-num">'+(i+1)+'.</span>'+q[LANG]+'</div>';
    if(q.type==='multi') html+='<div class="hint">'+(q.max===2?u.multi2:u.multi)+'</div>';
    if(q.type==='slider'){
      const val=(saved[q.id]!=null?saved[q.id]:5);
      html+='<div class="slider-row"><div class="slabels"><span>'+q['l'+LANG]+'</span><span>'+q['r'+LANG]+'</span></div>'
        +'<input type="range" min="1" max="10" value="'+val+'" name="'+q.id+'" aria-label="'+q[LANG]+'">'
        +'<div class="sval">'+val+' / 10</div></div>';
    } else {
      html+='<div class="options">';
      const inputType=q.type==='multi'?'checkbox':'radio';
      q.opts.forEach(opt=>{
        const checked=Array.isArray(saved[q.id])?saved[q.id].includes(opt.v):saved[q.id]===opt.v;
        html+='<label class="option'+(q.type==='multi'?' multi':'')+'">'
          +'<input type="'+inputType+'" name="'+q.id+'" value="'+opt.v.replace(/"/g,'&quot;')+'"'+(checked?' checked':'')+(q.max?' data-max="'+q.max+'"':'')+'>'
          +'<span class="mark"></span><span class="otext">'+opt[LANG]+'</span></label>';
      });
      html+='</div>';
    }
    box.innerHTML=html; sec.appendChild(box);
  });
  updateProgress();
}

function collectAnswers(){
  const ans={};
  QUESTIONS.forEach(q=>{
    if(q.type==='slider'){ const el=document.querySelector('input[name="'+q.id+'"]'); if(el) ans[q.id]=parseInt(el.value,10); }
    else if(q.type==='multi'){ const sel=[...document.querySelectorAll('input[name="'+q.id+'"]:checked')].map(e=>e.value); if(sel.length) ans[q.id]=sel; }
    else { const el=document.querySelector('input[name="'+q.id+'"]:checked'); if(el) ans[q.id]=el.value; }
  });
  return ans;
}

function countAnswered(){
  let n=0;
  QUESTIONS.forEach(q=>{
    if(q.type==='slider') n++; // sliders count as answered (default valid)
    else if(q.type==='multi'){ if(document.querySelector('input[name="'+q.id+'"]:checked')) n++; }
    else { if(document.querySelector('input[name="'+q.id+'"]:checked')) n++; }
  });
  return n;
}
function updateProgress(){
  const n=countAnswered();
  document.getElementById('fill').style.width=Math.round(n/TOTAL*100)+'%';
  document.getElementById('ptext').textContent=n+' / '+TOTAL;
}

document.getElementById('quiz').addEventListener('change',e=>{
  const t=e.target;
  if(t.type==='checkbox'){
    const max=t.dataset.max?parseInt(t.dataset.max,10):0;
    if(max){ const checked=[...document.querySelectorAll('input[name="'+t.name+'"]:checked')];
      if(checked.length>max){ checked[0].checked=false; } }
  }
  updateProgress();
});
document.getElementById('quiz').addEventListener('input',e=>{
  if(e.target.type==='range'){ const sv=e.target.parentElement.querySelector('.sval'); if(sv) sv.textContent=e.target.value+' / 10'; }
});

function generate(){
  const u=UI[LANG]; const n=countAnswered();
  if(n<20){ const w=document.getElementById('warn'); w.textContent=u.warn.replace('{n}',n); w.style.display='block'; return; }
  document.getElementById('warn').style.display='none';
  const res=computeResult(collectAnswers());
  lastResult=res; showResult(res,true);
}

function showResult(res,scroll){
  const u=UI[LANG]; const Aa=ANIMALS[res.animal]; const A=Aa[LANG]; const C=COLORS[res.color];
  const colorWord=capitalize(LANG==='en'?C.en.adj:(Aa.g==='m'?C.cz.adjM:C.cz.adjF));
  const animalWord=capitalize(A.name);
  const fullName=colorWord+' '+animalWord;
  // hero image with emoji fallback: img/{ANIMAL}_{COLOR}.png e.g. img/SOV_SAF.png
  const img=document.getElementById('cImg'), em=document.getElementById('cEmoji');
  // no placeholder flash: hide emoji, keep image invisible until it actually loads
  em.textContent=Aa.emoji; em.style.display='none'; img.alt=fullName;
  img.style.display='block'; img.style.opacity='0';
  img.onload=function(){ img.style.display='block'; img.style.opacity='1'; em.style.display='none'; };
  img.onerror=function(){ img.style.display='none'; img.style.opacity='1'; em.style.display='flex'; };
  img.src='img/'+res.animal+'_'+res.color+'.jpg';
  const lightTone=tint(C.hex,0.82), darkTone=tint(C.hex,0.5);
  const cwEl=document.getElementById('cColorWord');
  cwEl.textContent=colorWord; cwEl.style.color=darkTone;
  const awEl=document.getElementById('cAnimalWord');
  awEl.textContent=animalWord; awEl.style.color=lightTone;
  const ph=[ANIMAL_PH[res.animal][LANG][0],ANIMAL_PH[res.animal][LANG][1],COLOR_PH[res.color][LANG]];
  document.getElementById('cPhrases').innerHTML=
    '<div class="ph-line" style="color:'+lightTone+'">'+ph[0]+'</div>'+
    '<div class="ph-line" style="color:'+lightTone+'">'+ph[1]+'</div>'+
    '<div class="ph-line col" style="color:'+darkTone+'">'+ph[2]+'</div>';
  // card gradient from color
  const card=document.getElementById('card');
  card.style.background='linear-gradient(150deg,'+shade(C.hex,-12)+','+shade(C.hex,-42)+')';
  document.getElementById('result').style.display='block';
  if(scroll) document.getElementById('result').scrollIntoView({behavior:'smooth'});
}

function capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function shade(hex,p){ // p negative => darker
  const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  const f=(p<0)?(100+p)/100:1; r=Math.round(r*f); g=Math.round(g*f); b=Math.round(b*f);
  return 'rgb('+r+','+g+','+b+')';
}
function tint(hex,amt){ const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.round(r+(255-r)*amt); g=Math.round(g+(255-g)*amt); b=Math.round(b+(255-b)*amt);
  return 'rgb('+r+','+g+','+b+')'; }

function roundRectPath(ctx,x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function shareCard(){
  const card=document.getElementById('card');
  const img=document.getElementById('cImg');
  if(typeof html2canvas==='undefined'){ alert(UI[LANG].dlErr); return; }
  // emulate object-fit:cover via a background div — html2canvas renders background cover
  // correctly (no horizontal squeeze, unlike object-fit on <img>)
  let bg=null;
  if(img && img.getAttribute('src') && img.complete && img.naturalWidth>0){
    bg=document.createElement('div');
    bg.style.cssText='position:absolute;inset:0;z-index:0;background-image:url("'+img.src+'");background-size:cover;background-position:center top;background-repeat:no-repeat';
    img.style.visibility='hidden';
    card.insertBefore(bg, card.firstChild);
  }
  const pb=card.style.border; card.style.border='none';
  function cleanup(){ card.style.border=pb; if(bg){ try{card.removeChild(bg);}catch(_){} } if(img) img.style.visibility=''; }
  html2canvas(card,{backgroundColor:null,scale:3,useCORS:true,logging:false}).then(function(cv){
    cleanup();
    try{
      const out=document.createElement('canvas'); out.width=cv.width; out.height=cv.height;
      const ctx=out.getContext('2d');
      const r=Math.round(22*(out.width/card.offsetWidth));
      roundRectPath(ctx,0,0,out.width,out.height,r); ctx.clip(); ctx.drawImage(cv,0,0);
      out.toBlob(function(blob){
        if(!blob){ alert(UI[LANG].dlErr); return; }
        const file=new File([blob],'animalme.png',{type:'image/png'});
        const name=document.getElementById('cAnimalWord').textContent;
        if(navigator.canShare && navigator.canShare({files:[file]})){
          navigator.share({files:[file],title:'AnimalMe',text:name+' · animal-me.com'}).catch(function(){});
        } else {
          const a=document.createElement('a'); a.download='animalme.png'; a.href=URL.createObjectURL(blob); a.click();
        }
      },'image/png');
    }catch(e){ alert(UI[LANG].dlErr); }
  }).catch(function(){ cleanup(); alert(UI[LANG].dlErr); });
}
function copyText(){
  if(!lastResult) return; const Aa=ANIMALS[lastResult.animal]; const A=Aa[LANG]; const Cc=COLORS[lastResult.color]; const C=Cc[LANG];
  const cw=capitalize(LANG==='en'?Cc.en.adj:(Aa.g==='m'?Cc.cz.adjM:Cc.cz.adjF));
  const txt=cw+' '+capitalize(A.name)+'\n'+ANIMAL_PH[lastResult.animal][LANG][0]+'\n'+ANIMAL_PH[lastResult.animal][LANG][1]+'\n'+COLOR_PH[lastResult.color][LANG]+'\nanimal-me.com';
  navigator.clipboard.writeText(txt).then(()=>{ const b=document.getElementById('btnCopy'); const o=b.textContent; b.textContent=UI[LANG].copied; setTimeout(()=>b.textContent=o,1800); });
}
function joinCommunity(){
  if(!lastResult) return; const link=COMMUNITY_LINKS[lastResult.animal];
  if(!link||link==='#'){ alert(UI[LANG].soon); return; }
  window.open(link,'_blank');
}
function restart(){
  lastResult=null; document.getElementById('result').style.display='none';
  render(); window.scrollTo({top:0,behavior:'smooth'});
}

render();
